apis:
  - aid: aiven:aiven-api
    name: Aiven REST API
    description: >
      The Aiven REST API provides programmatic access to the Aiven platform for provisioning
      and managing open-source data services including Apache Kafka, PostgreSQL, OpenSearch,
      Redis, MySQL, ClickHouse, and more. The API supports full lifecycle management of
      services, projects, organizations, billing, VPCs, integrations, and user access controls.
      Authentication is via personal access tokens or OAuth2 authorization code flow with
      granular scopes for accounts, billing, projects, and services.
    humanURL: https://aiven.io/docs/tools/api
