servers:
- url: https://api.aiven.io/v1
tags:
- name: Account
  x-displayName: Account
paths:
  /account/{account_id}/payment_methods:
    post:
      summary: Attach payment method for account
      tags:
      - Account
      operationId: AccountAttachPaymentMethod
      parameters:
      - $ref: '#/components/parameters/account_id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountAttachPaymentMethodRequestBody'
            example:
              payment_method_id: pm_1Q0PsIJvEtkwdCNYMSaVuRz6
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAttachPaymentMethodResponse'
      security:
      - tokenAuth: []
        oauth2:
        - accounts:write
        - payments:write
    get:
      summary: List credit cards attached as a payment method to the account
      tags:
      - Account
      operationId: AccountPaymentMethodsList
      parameters:
      - $ref: '#/components/parameters/account_id'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPaymentMethodsListResponse'
      security:
      - tokenAuth: []
        oauth2:
        - accounts:read
        - payments:read
  /account/{account_id}/authentication:
    post:
      summary: Create a new authentication method
      tags:
      - Account
      operationId: AccountAuthenticationMethodCreate
      parameters:
      - $ref: '#/components/parameters/account_id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountAuthenticationMethodCreateRequestBody'
            example:
              auth_token_extend_when_used: true
              auth_token_max_age_seconds: 42
              authentication_method_name: Main SAML service
              authentication_method_type: internal
              auto_join_team_id: at29872a9e
              auto_join_user_group_id: ug22ba494e096
              linked_domains:
              - domain_id: domain-a9s7d6f98as7d6
              saml_assertion_signed_enabled: true
              saml_authn_requests_signed_enabled: true
              saml_certificate: '-----BEGIN CERTIFICATE...'
              saml_digest_algorithm: sha256
              saml_entity_id: https://example.com/saml2/entity
              saml_field_mapping:
                email: email
                first_name: first_name
                groups: groups
                identity: email
                last_name: last_name
                real_name: full_name
              saml_idp_login_allowed: true
              saml_idp_url: https://example.com/saml2/idp
              saml_join_groups: true
              saml_requested_authn_context_enabled: true
              saml_signature_algorithm: rsa-sha256
              saml_variant: adfs
              scim_enabled: true
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAuthenticationMethodCreateResponse'
      security:
      - tokenAuth: []
        oauth2:
        - accounts:write
        - authentication:write
    get:
      summary: List authentication methods
      tags:
      - Account
      operationId: AccountAuthenticationMethodsList
      parameters:
      - $ref: '#/components/parameters/account_id'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAuthenticationMethodsListResponse'
      security:
      - tokenAuth: []
        oauth2:
        - accounts:read
        - authentication:read
  /account/{account_id}/authentication/{account_authentication_method_id}:
    delete:
      summary: Delete authentication method
      tags:
      - Account
      operationId: AccountAuthenticationMethodDelete
      parameters:
      - $ref: '#/components/parameters/account_id'
      - $ref: '#/components/parameters/account_authentication_method_id'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAuthenticationMethodDeleteResponse'
      security:
      - tokenAuth: []
        oauth2:
        - accounts:write
        - authentication:write
    get:
      summary: Get details of a single authentication method
      tags:
      - Account
      operationId: AccountAuthenticationMethodGet
      parameters:
      - $ref: '#/components/parameters/account_id'
