servers:
- url: https://api.aiven.io/v1
tags:
- name: Service:_OpenSearch
  x-displayName: 'Service: OpenSearch'
paths:
  /project/{project}/service/{service_name}/opensearch/acl:
    get:
      summary: Show OpenSearch ACL configuration
      tags:
      - Service:_OpenSearch
      operationId: ServiceOpenSearchAclGet
      parameters:
      - $ref: '#/components/parameters/project'
      - $ref: '#/components/parameters/service_name'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOpenSearchAclGetResponse'
      security:
      - tokenAuth: []
        oauth2:
        - services:read
    post:
      summary: Set OpenSearch ACL configuration
      tags:
      - Service:_OpenSearch
      operationId: ServiceOpenSearchAclSet
      parameters:
      - $ref: '#/components/parameters/project'
      - $ref: '#/components/parameters/service_name'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOpenSearchAclSetRequestBody'
            example:
              opensearch_acl_config:
                acls:
                - rules:
                  - index: ind*
                    permission: deny
                  username: admin*
                enabled: false
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOpenSearchAclSetResponse'
      security:
      - tokenAuth: []
        oauth2:
        - services:write
    put:
      summary: Update OpenSearch ACL configuration
      tags:
      - Service:_OpenSearch
      operationId: ServiceOpenSearchAclUpdate
      parameters:
      - $ref: '#/components/parameters/project'
      - $ref: '#/components/parameters/service_name'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOpenSearchAclUpdateRequestBody'
            example:
              opensearch_acl_config:
                acls:
                - rules:
                  - index: ind*
                    permission: deny
                  username: admin*
                enabled: false
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOpenSearchAclUpdateResponse'
      security:
      - tokenAuth: []
        oauth2:
        - services:write
  /project/{project}/service/{service_name}/opensearch/{index_pattern}/_close:
    post:
      summary: Open OpenSearch indices
      tags:
      - Service:_OpenSearch
      operationId: ServiceOpenSearchIndexClose
      parameters:
      - $ref: '#/components/parameters/project'
      - $ref: '#/components/parameters/service_name'
      - $ref: '#/components/parameters/index_pattern'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOpenSearchIndexCloseResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    title: Human readable error message
                  errors:
                    type: array
                    title: List of error details. Typically there is only one element
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          title: Human readable error message
                        error_code:
                          type: string
                          enum:
                          - index_close_failed
                          title: Machine processable error code. Clients must be prepared to handle new codes.
                          description: 'index_close_failed: Index close failed'
        '409':
          description: Request conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    title: Human readable error message
                  errors:
                    type: array
                    title: List of error details. Typically there is only one element
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          title: Human readable error message
                        error_code:
                          type: string
                          enum:
                          - not_powered
                          title: Machine processable error code. Clients must be prepared to handle new codes.
                          description: 'not_powered: Service is not powered'
        '429':
          description: The user has sent too many requests in a given amount of time ("rate limiting")
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    title: Human readable error message
