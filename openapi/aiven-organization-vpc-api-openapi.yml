components:
  schemas:
    OrganizationVpcCloudsListResponse:
      type: object
      description: OrganizationVpcCloudsListResponse
      properties:
        clouds:
          type: array
          description: List of available clouds
          items:
            type: object
            properties:
              cloud_description:
                type: string
                description: Cloud provider and location
              cloud_name:
                type: string
                maxLength: 256
                description: Target cloud
              geo_latitude:
                type: number
                description: Approximate geographic latitude of the datacenters
              geo_longitude:
                type: number
                description: Approximate geographic longitude of the datacenters
              geo_region:
                type: string
                description: Geographical region
              provider:
                type: string
                description: Cloud provider name
              provider_description:
                type: string
                description: Cloud provider description
            required:
            - cloud_name
            - geo_region
        errors:
          type: array
          description: List of errors occurred during request processing
          items:
            type: object
            properties:
              message:
                type: string
                description: Printable error message
              more_info:
                type: string
                description: URL to the documentation of the error
              status:
                type: integer
                description: HTTP error status code
            required:
            - message
            - status
        message:
          type: string
          description: Printable result of the request
      required:
      - clouds
    OrganizationVpcUpdateResponse:
      type: object
      description: OrganizationVpcUpdateResponse
      properties:
        clouds:
          type: array
          description: Clouds or clouds to create this VPC in
          items:
            type: object
            properties:
              cloud_name:
                type: string
                maxLength: 256
                description: Target cloud
              network_cidr:
                type: string
                maxLength: 18
                description: IPv4 network range CIDR
            required:
            - cloud_name
            - network_cidr
        create_time:
          type: string
          maxLength: 36
          description: VPC creation timestamp
        display_name:
          type: string
          maxLength: 64
          description: User defined display name for this VPC
        errors:
          type: array
          description: List of errors occurred during request processing
          items:
            type: object
            properties:
              message:
                type: string
                description: Printable error message
              more_info:
                type: string
                description: URL to the documentation of the error
              status:
                type: integer
                description: HTTP error status code
            required:
            - message
            - status
        message:
          type: string
          description: Printable result of the request
        organization_id:
          type: string
          maxLength: 36
          description: Organization ID
        organization_vpc_id:
          type: string
          minLength: 36
          maxLength: 36
          description: Project VPC ID
        peering_connections:
          type: array
          description: List of peering connections
          items:
            type: object
            properties:
              create_time:
                type: string
                maxLength: 36
                description: VPC peering connection creation timestamp
              peer_azure_app_id:
                type: string
                maxLength: 1024
                description: Azure app registration id in UUID4 form that is allowed to create a peering to the peer vnet
              peer_azure_tenant_id:
                type: string
                maxLength: 1024
                description: Azure tenant id in UUID4 form
              peer_cloud_account:
                type: string
                maxLength: 1024
                description: AWS account ID, GCP project ID, Azure subscription ID of the peered VPC, or string &quot;upcloud&quot; for UpCloud peering connections
              peer_region:
                type: string
                maxLength: 1024
                description: The peer VPC's region in AWS clouds. Always null in GCP, Azure, or UpCloud clouds
              peer_resource_group:
                type: string
                maxLength: 1024
                description: Azure resource group name of the peered VPC
              peer_vpc:
                type: string
                maxLength: 1024
                description: AWS VPC ID, GCP VPC network name, Azure Virtual network name of the peered VPC, or UpCloud VPC ID
              peering_connection_id:
                type: string
                minLength: 36
                maxLength: 36
                description: VPC peering connection ID
              state:
                type: string
                description: Project VPC peering connection state
                enum:
                - ACTIVE
                - APPROVED
                - APPROVED_PEER_REQUESTED
                - DELETED
                - DELETED_BY_PEER
                - DELETING
                - ERROR
                - INVALID_SPECIFICATION
                - PENDING_PEER
                - REJECTED_BY_PEER
              state_info:
                type: object
                description: State-specific help or error information
                properties:
                  message:
                    type: string
                    description: Human-readable information message
                  type:
                    type: string
                    description: Type of state information
                  warnings:
                    type: array
                    description: List of warnings if any
                    items:
                      type: object
                      properties:
                        conflicting_aws_account_id:
                          type: string
                          description: AWS account id of conflicting VPC
                        conflicting_aws_vpc_id:
                          type: string
                          description: VPC id which is conflicting with the current one
                        conflicting_aws_vpc_peering_connection_id:
                          type: string
                          description: AWS VPC connection id which is conflicting with current VPC
                        message:
                          type: string
                          description: Warning message to be shown to the user
                        type:
                          type: string
                          description: Type of warning
                          enum:
                          - overlapping-peer-vpc-ip-ranges
                          - upcloud-peering-in-error
                      required:
                      - message
                      - type
                required:
                - message
                - type
              update_time:
                type: string
                maxLength: 36
                description: Timestamp of last change to the VPC peering connection
              user_peer_network_cidrs:
                type: array
                maxItems: 128
                description: List of private IPv4 ranges to route through the peering connection
                items:
                  type: string
              vpc_peering_connection_type:
                type: string
                description: Type of network connection from the VPC
                enum:
                - aws-tgw-vpc-attachment
                - aws-vpc-peering-connection
                - azure-vnet-peering
                - do-vpc-peering
                - google-vpc-peering
                - upcloud-vpc-peering
            required:
            - create_time
            - peer_azure_app_id
            - peer_azure_tenant_id
            - peer_cloud_account
            - peer_resource_group
            - peer_vpc
            - state
            - state_info
            - update_time
            - user_peer_network_cidrs
            - vpc_peering_connection_type
        pending_build_only_peering_connections:
          type: string
          maxLength: 36
          description: VPC rebuild is scheduled
        state:
          type: string
          description: Project VPC state
          enum:
          - ACTIVE
          - APPROVED
          - DELETED
          - DELETING
        update_time:
          type: string
          maxLength: 36
          description: Timestamp of last change to VPC
      required:
      - clouds
      - create_time
      - display_name
      - organization_id
      - organization_vpc_id
      - peering_connections
      - state
      - update_time
