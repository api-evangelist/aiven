servers:
- url: https://api.aiven.io/v1
tags:
- name: Organization_Vpc
  x-displayName: Organization Vpc
paths:
  /organization/{organization_id}/vpc-clouds:
    get:
      summary: List organization VPC clouds
      tags:
      - Organization_Vpc
      operationId: OrganizationVpcCloudsList
      description: <p>List clouds available for creating organization VPCs in this organization.</p>
      parameters:
      - $ref: '#/components/parameters/organization_id'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationVpcCloudsListResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    title: Human readable error message
                  errors:
                    type: array
                    title: List of error details. Typically there is only one element
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          title: Human readable error message
                        error_code:
                          type: string
                          enum:
                          - organization_not_found
                          title: Machine processable error code. Clients must be prepared to handle new codes.
                          description: 'organization_not_found: Organization not found.'
      security:
      - tokenAuth: []
        oauth2:
        - accounts:read
  /organization/{organization_id}/vpcs:
    post:
      summary: Create organization VPC
      tags:
      - Organization_Vpc
      operationId: OrganizationVpcCreate
      description: <p>Creates an organization VPC. This requires the manage-organization-networking permissions and can be also achieved using the Aiven Console, the Aiven CLI, or the Aiven Terraform Provider.</p>
      parameters:
      - $ref: '#/components/parameters/organization_id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationVpcCreateRequestBody'
            example:
              clouds:
              - cloud_name: aws-eu-central-1
                network_cidr: 192.168.6.0/24
              display_name: My organization VPC
              peering_connections:
              - peer_azure_app_id: adcf7194-d877-4505-a47a-91fefd96e3b8
                peer_azure_tenant_id: adcf7194-d877-4505-a47a-91fefd96e3b8
                peer_cloud_account: '123456789012'
                peer_region: us-east-1
                peer_resource_group: my-peered-rg
                peer_vpc: vpc-2f09a348
                user_peer_network_cidrs:
                - 192.168.6.0/24
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationVpcCreateResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    title: Human readable error message
                  errors:
                    type: array
                    title: List of error details. Typically there is only one element
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          title: Human readable error message
                        error_code:
                          type: string
                          enum:
                          - organization_not_found
                          title: Machine processable error code. Clients must be prepared to handle new codes.
                          description: 'organization_not_found: Organization not found.'
      security:
      - tokenAuth: []
        oauth2:
        - accounts:write
    get:
      summary: List organization VPCs
      tags:
      - Organization_Vpc
      operationId: OrganizationVpcList
      description: <p>Lists organization VPCs in an organization.</p>
      parameters:
      - $ref: '#/components/parameters/organization_id'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationVpcListResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    title: Human readable error message
                  errors:
                    type: array
                    title: List of error details. Typically there is only one element
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          title: Human readable error message
                        error_code:
                          type: string
