    ServiceBackupsGetResponse:
      type: object
      description: ServiceBackupsGetResponse
      properties:
        backup_progress:
          type: string
          description: Scheduled time for the next backup
        backups:
          type: array
          description: List of backups for the service
          items:
            type: object
            properties:
              additional_regions:
                type: array
                description: Additional backup regions, if available
                items:
                  type: object
                  properties:
                    cloud:
                      type: string
                      maxLength: 256
                      description: Target cloud
                    pause_reason:
                      type: string
                      description: Reason for pausing the backup synchronization
                    paused:
                      type: boolean
                      description: Indicates additional backup synchronization is paused
                    region:
                      type: string
                      description: Cloud storage region name
                  required:
                  - cloud
              backup_name:
                type: string
                description: Internal name of this backup
              backup_time:
                type: string
                maxLength: 36
                description: Backup timestamp (ISO 8601)
              data_size:
                type: integer
                description: Backup's original size before compression
              incremental:
                type: boolean
                description: Indicates if this backup is a full or an incremental one (available only for MySQL)
              storage_location:
                type: string
                description: Location where this backup is stored
              tiered_storage_data_size:
                type: integer
                description: The amount of tiered storage data in bytes referenced by this backup.
            required:
            - backup_name
            - backup_time
            - data_size
        errors:
          type: array
          description: List of errors occurred during request processing
          items:
            type: object
            properties:
              message:
                type: string
                description: Printable error message
              more_info:
                type: string
                description: URL to the documentation of the error
              status:
                type: integer
                description: HTTP error status code
            required:
            - message
            - status
        message:
          type: string
          description: Printable result of the request
        pitr:
          type: object
          description: Point-in-time-recovery metadata for the service. If not set, service type does not support PITR.
          title: Backup PITR metadata
          properties:
            additional_regions:
              type: array
              description: Empty array if BTAR is not enabled or BTAR+PITR is not supported.
              title: Backup PITR metadata for additional backup regions
              items:
                type: object
                properties:
                  cloud:
                    type: string
                    maxLength: 256
                    description: Target cloud
                  pitr_range_end:
                    type: string
                    maxLength: 36
                    description: Latest timestamp usable for PITR (ISO 8601) (always set)
                  pitr_range_start:
                    type: string
                    maxLength: 36
                    description: Earliest timestamp usable for PITR (ISO 8601) (always set)
                  region:
                    type: string
                    description: Cloud storage region name
                required:
                - cloud
                - pitr_range_end
                - pitr_range_start
                - region
            primary_region:
              type: object
              description: Point-in-time-recovery metadata related to the primary backup location of the service.
              title: Backup PITR metadata primary
              properties:
                pitr_range_end:
                  type: string
                  maxLength: 36
                  description: Latest timestamp usable for PITR (ISO 8601) (null means current time)
                pitr_range_start:
                  type: string
                  maxLength: 36
                  description: Earliest timestamp usable for PITR (ISO 8601) (null means no available backup for PITR)
              required:
              - pitr_range_end
              - pitr_range_start
          required:
          - additional_regions
          - primary_region
        scheduled_backup_time:
          type: object
          description: Scheduled time and frequency of service backups
          properties:
            backup_hour:
              type: integer
              minimum: 0
              maximum: 23
              description: The hour of day (in UTC) when backup for the service is started. New backup is only started if previous backup has already completed.
            backup_interval_hours:
              type: integer
              description: Service backup interval in hours
            backup_minute:
              type: integer
              minimum: 0
              maximum: 59
              description: The minute of an hour when backup for the service is started. New backup is only started if previous backup has already completed.
      required:
      - backups
    ProjectGetServiceLogsRequestBody:
