      summary: Create a new task for service
      tags:
      - Service
      operationId: ServiceTaskCreate
      parameters:
      - $ref: '#/components/parameters/project'
      - $ref: '#/components/parameters/service_name'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceTaskCreateRequestBody'
            example:
              create_searchable_snapshot:
                indices: my-index
              create_user_backup:
                backup_name: influxdb-backup
              dataset_import:
                dataset_name: pagila
              migration_check:
                ignore_dbs: db1,db2
                ignore_roles: role1,role2
                method: dump
                source_project_name: myproject
                source_service_name: db123
                source_service_uri: mysql://user:pass@host:port/db
              target_version: '18'
              task_type: upgrade_check
              upgrade_check:
