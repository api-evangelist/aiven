                        title: Permitted pub/sub channel patterns
                        items:
                          type: string
                      redis_acl_commands:
                        type: array
                        maxItems: 256
                        description: Rules for individual commands
                        items:
                          type: string
                      redis_acl_keys:
                        type: array
                        maxItems: 256
                        description: Key access rules
                        items:
