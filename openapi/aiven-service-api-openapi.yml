                        maxLength: 128
                        description: Subscription plan
                      service_type:
                        type: string
                        maxLength: 64
                        description: Service type code
                      shard_count:
                        type: integer
                        minimum: 1
                        description: Number of shards in this service plan
                    required:
                    - backup_config
                    - service_plan
                    - service_type
                user_config_schema:
                  type: object
                  description: JSON-Schema for the 'user_config' properties
