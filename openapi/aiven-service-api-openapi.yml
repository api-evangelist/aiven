          properties:
            dragonfly_acl_categories:
              type: array
              maxItems: 256
              description: Command category rules
              items:
                type: string
            dragonfly_acl_commands:
              type: array
              maxItems: 256
              description: Rules for individual commands
              items:
                type: string
            dragonfly_acl_keys:
              type: array
              maxItems: 256
              description: Key access rules
              items:
                type: string
            pg_allow_replication:
              type: boolean
              description: Enable REPLICATION role option
            redis_acl_categories:
              type: array
              maxItems: 256
              description: Command category rules
              items:
                type: string
            redis_acl_channels:
              type: array
              maxItems: 256
              description: Glob-style patterns defining which pub/sub channels can be accessed. If array is not defined, the default policy is used (allchannels).
              title: Permitted pub/sub channel patterns
              items:
                type: string
            redis_acl_commands:
              type: array
              maxItems: 256
              description: Rules for individual commands
              items:
                type: string
            redis_acl_keys:
              type: array
              maxItems: 256
              description: Key access rules
              items:
                type: string
            valkey_acl_categories:
              type: array
              maxItems: 256
              description: Command category rules
              items:
                type: string
            valkey_acl_channels:
              type: array
              maxItems: 256
              description: Glob-style patterns defining which pub/sub channels can be accessed. If array is not defined, the default policy is used (allchannels).
              title: Permitted pub/sub channel patterns
              items:
                type: string
            valkey_acl_commands:
              type: array
              maxItems: 256
              description: Rules for individual commands
              items:
                type: string
            valkey_acl_keys:
              type: array
              maxItems: 256
              description: Key access rules
              items:
                type: string
        authentication:
          type: string
          description: Service specific authentication details. Currently only used for MySQL where accepted options are 'mysql_native_password' and 'caching_sha2_password', latter being default when this is not explicitly set.
          title: Authentication details
          enum:
          - 'null'
          - caching_sha2_password
          - mysql_native_password
        new_password:
          type: string
          minLength: 8
          maxLength: 256
          description: New password
        operation:
          type: string
          description: Operation type
          enum:
          - acknowledge-renewal
          - reset-credentials
          - set-access-control
