  /project/{project}/service/{service_name}/rotate-internal-secrets:
    post:
      summary: Rotate DataHub internal authentication secrets
      tags:
      - Service
      operationId: ServiceDataHubRotateInternalSecrets
      description: '<p>Generates fresh values for DATAHUB_SECRET (Play session signing key) and DATAHUB_SYSTEM_CLIENT_SECRET (system OAuth client secret), updates every DataHub app child accordingly, and triggers a coordinated restart so the new values take effect everywhere simultaneously. USER-VISIBLE SIDE EFFECT: every active browser session is invalidated -- all currently logged-in users will be signed out and must re-login after the coordinated restart. Inter-service calls may briefly return 401 errors while the rotation is in flight. DATAHUB_SYSTEM_CLIENT_ID is the fixed identifier &quot;__datahub_system&quot; and is intentionally left untouched.</p>'
      parameters:
      - $ref: '#/components/parameters/project'
      - $ref: '#/components/parameters/service_name'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDataHubRotateInternalSecretsResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    title: Human readable error message
                  errors:
                    type: array
                    title: List of error details. Typically there is only one element
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          title: Human readable error message
                        error_code:
                          type: string
                          enum:
                          - service_not_found
                          title: Machine processable error code. Clients must be prepared to handle new codes.
                          description: 'service_not_found: Service not found'
        '409':
          description: Request conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    title: Human readable error message
                  errors:
                    type: array
                    title: List of error details. Typically there is only one element
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          title: Human readable error message
                        error_code:
                          type: string
                          enum:
                          - service_type_not_allowed
                          title: Machine processable error code. Clients must be prepared to handle new codes.
                          description: 'service_type_not_allowed: Service type not allowed'
      security:
      - tokenAuth: []
        oauth2:
        - services:write
