                  expiring_cert_not_valid_after_time:
                    type: string
                    description: When the existing certificate is nearing expiration and a new certificate has been generated, the validity end time (ISO8601) for the expiring certificate
                    title: Validity end time (ISO8601) for the expiring access certificate
