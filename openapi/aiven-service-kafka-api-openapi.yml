              title: cpu percentage throttle
            user:
              type: string
              maxLength: 64
              description: Represents a logical group of clients, assigned a unique name by the client application. Quotas can be applied based on user, client-id, or both. The most relevant quota is chosen for each connection. All connections within a quota group share the same quota.
              title: user
          required:
          - client\-id
          - consumer_byte_rate
          - producer_byte_rate
          - request_percentage
          - user
      required:
      - quota
