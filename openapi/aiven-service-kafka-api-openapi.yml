              description: Represents a logical group of clients, assigned a unique name by the client application. Quotas can be applied based on user, client-id, or both. The most relevant quota is chosen for each connection. All connections within a quota group share the same quota.
              title: client-id
            consumer_byte_rate:
              type: number
              minimum: 0
              maximum: 1073741824
              description: Defines the bandwidth limit in bytes/sec for each group of clients sharing a quota. Every distinct client group is allocated a specific quota, as defined by the cluster, on a per-broker basis. Exceeding this limit results in client throttling.
              title: consumer network throttle
            producer_byte_rate:
              type: number
              minimum: 0
              maximum: 1073741824
              description: Defines the bandwidth limit in bytes/sec for each group of clients sharing a quota. Every distinct client group is allocated a specific quota, as defined by the cluster, on a per-broker basis. Exceeding this limit results in client throttling.
              title: producer network throttle
            request_percentage:
              type: number
