servers:
- url: https://api.aiven.io/v1
tags:
- name: Project
  x-displayName: Project
paths:
  /project/{project}/vpc-peering-connection-types:
    get:
      summary: List VPC peering connection types for a project
      tags:
      - Project
      operationId: ListProjectVpcPeeringConnectionTypes
      parameters:
      - $ref: '#/components/parameters/project'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectVpcPeeringConnectionTypesResponse'
      security:
      - tokenAuth: []
        oauth2:
        - projects:read
  /project/{project}/alerts:
    get:
      summary: List active alerts for a project
      tags:
      - Project
      operationId: ProjectAlertsList
      parameters:
      - $ref: '#/components/parameters/project'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectAlertsListResponse'
      security:
      - tokenAuth: []
        oauth2:
        - projects:read
  /project:
    post:
      summary: Create a project
      tags:
      - Project
      operationId: ProjectCreate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequestBody'
            example:
              account_id: a22ba494e096
              add_account_owners_admin_access: true
              address_lines:
              - Main Street 1
              base_port: 10000
              billing_address: 'DEPRECATED: use split address fields like `company`, `address_lines`, `zip_code`, `city` and `state` instead'
              billing_currency: USD
              billing_emails:
              - email: jane@example.com
              billing_extra_text: 'Purchase order: PO100018'
              billing_group_id: ffb3f0cd-5532-4eb9-8867-f2cac5823492
              card_id: 9330c086-8781-11e5-89ff-5404a64abfef
              city: Helsinki
              cloud: aws-eu-central-1
              company: My Company
              copy_from_project: myexistingproject
              copy_tags: true
              country_code: FI
              project: myproject
              state: ''
              tags: {}
              tech_emails:
              - email: jane@example.com
              use_source_project_billing_group: false
              vat_id: FI27957435
              zip_code: '01234'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCreateResponse'
        '409':
          description: Request conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    title: Human readable error message
                  errors:
                    type: array
                    title: List of error details. Typically there is only one element
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          title: Human readable error message
                        error_code:
                          type: string
                          enum:
                          - project_already_exists
                          title: Machine processable error code. Clients must be prepared to handle new codes.
                          description: 'project_already_exists: Project already exists'
      security:
      - tokenAuth: []
        oauth2:
        - projects:write
    get:
      summary: List projects
      tags:
      - Project
      operationId: ProjectList
      deprecated: true
      description: '<p>DEPRECATED: Use the organization projects API to list projects within each organization</p>'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
      security:
      - tokenAuth: []
        oauth2:
        - projects:read
  /project/{project}:
    delete:
      summary: Delete project
      tags:
      - Project
      operationId: ProjectDelete
      deprecated: true
      description: '<p>DEPRECATED: Use the per-organization project DELETE API</p>'
      parameters:
      - $ref: '#/components/parameters/project'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDeleteResponse'
      security:
      - tokenAuth: []
        oauth2:
        - projects:write
    get:
      summary: Get project details
      tags:
      - Project
      operationId: ProjectGet
